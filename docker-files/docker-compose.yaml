# Docker Compose configuration for a Minecraft Paper server

services:
  minecraft-paper:
    image: itzg/minecraft-server:latest
    container_name: minecraft-paper-server
    restart: unless-stopped
    
    mem_limit: 5g
    cpus: "4.0"

    ports:
      # Expose the standard Minecraft Java port
      - "25565:25565"
    environment:
      # Server Type Configuration
      TYPE: "PAPER"
      VERSION: "LATEST"
      
      # Resource Allocation (Enforces 4 GB RAM limit)
      MEMORY: "5G"
      
      # Server Rules & Properties
      EULA: "TRUE"
      ONLINE_MODE: "FALSE"
      DIFFICULTY: "normal"
      MAX_PLAYERS: "20"
      WHITE_LIST: "TRUE"
      SEED: "95920844204830198"
      ENFORCE_WHITELIST: "TRUE"
      FORCE_GAMEMODE: "TRUE"
      VIEW_DISTANCE: "14"
      
      # JVM Performance Optimization Tuning
      JVM_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8m -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
    volumes:
      # Binds server data to a local 'data' directory for easy backups and plugin management
      - ./data:/data
